<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout - Silent Aid</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* BASE */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: black;
  color: white;
}

/* 🔥 FIRE BG */
.bg-glow {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at bottom, rgba(255,69,0,0.3), transparent 60%);
  z-index: -1;
  animation: flicker 4s infinite alternate;
}

@keyframes flicker {
  0% { opacity: 0.6; }
  100% { opacity: 1; }
}

/* HEADER */
.marquee {
  background: #8B0000;
  padding: 10px;
  text-align: center;
  font-weight: bold;
}

/* TITLE */
h2 {
  text-align: center;
  margin-top: 30px;
  color: #D4AF37;
}

/* FORM */
form {
  max-width: 550px;
  margin: 30px auto;
  background: rgba(20,20,20,0.9);
  padding: 30px;
  border-radius: 12px;
  box-shadow: 0 0 25px rgba(255,69,0,0.3);
}

/* PRODUCT BOX */
.product-box {
  display: flex;
  gap: 15px;
  background: #111;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
  align-items: center;
}

.product-box img {
  width: 80px;
  border-radius: 8px;
}

.product-info h3 {
  margin: 0;
}

.price {
  color: #D4AF37;
}

/* INPUTS */
label {
  display: block;
  margin-top: 15px;
  font-weight: 600;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  background: #222;
  color: white;
  border: 1px solid #555;
  border-radius: 6px;
}

/* BUTTON */
button {
  margin-top: 25px;
  padding: 14px;
  width: 100%;
  background: linear-gradient(45deg, #8B0000, #FF4500);
  border: none;
  color: white;
  font-size: 16px;
  border-radius: 8px;
  cursor: pointer;
}

/* OTHER CITY */
#otherCityField {
  display: none;
  margin-top: 10px;
}

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="marquee">🔥 Silent Aid | Free Delivery Across India 🇮🇳</div>

<h2>Complete Your Order</h2>

<form id="orderForm">

  <!-- PRODUCT -->
  <div class="product-box">
    <img src="images/frame.png">
    <div class="product-info">
      <h3>Pray For Gaza Frame</h3>
      <p class="price">₹299</p>
    </div>
  </div>

  <label>Full Name:
    <input type="text" name="name" required>
  </label>

  <label>Email:
    <input type="email" name="email" required>
  </label>

  <label>Phone Number:
    <input type="tel" name="phone" required>
  </label>

  <label>WhatsApp Number:
    <input type="tel" name="whatsapp" required>
  </label>

  <label>City:
    <select name="city" id="citySelect" required>
      <option value="">-- Select Your City --</option>
      <option>Hyderabad</option>
      <option>Delhi</option>
      <option>Mumbai</option>
      <option>Bengaluru</option>
      <option>Chennai</option>
      <option>Kolkata</option>
      <option>Pune</option>
      <option value="Other">Other</option>
    </select>
  </label>

  <div id="otherCityField">
    <label>Enter Your City:
      <input type="text" id="otherCityInput">
    </label>
  </div>

  <label>Full Address:
    <textarea name="address" required></textarea>
  </label>

  <button type="submit">Place Order</button>

</form>

<script>

const form = document.getElementById('orderForm');
const citySelect = document.getElementById('citySelect');
const otherCityField = document.getElementById('otherCityField');
const otherCityInput = document.getElementById('otherCityInput');

citySelect.addEventListener('change', () => {
  if (citySelect.value === 'Other') {
    otherCityField.style.display = 'block';
    otherCityInput.required = true;
  } else {
    otherCityField.style.display = 'none';
    otherCityInput.required = false;
  }
});

form.addEventListener('submit', function(e) {
  e.preventDefault();

  const formData = new FormData(form);

  if (citySelect.value === 'Other') {
    formData.set('city', otherCityInput.value.trim());
  }

  formData.set('product', 'Pray For Gaza Frame');
  formData.set('price', '399');

  fetch("https://script.google.com/macros/s/AKfycbxisICLhzPNqqXPnFdBcAZkiz2iuLvmoIy-kvbzXf5e4JtVyr7jKpuUldWQT9iWlex4/exec", {
    method: 'POST',
    body: formData
  })
  .then(() => {
    window.location.href = "thank-you.html";
  })
  .catch(() => {
    alert("Error submitting order");
  });

});

</script>

</body>
</html>
