<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout - Silent Aid</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #000;
  color: white;
}

/* TOP */
.topbar {
  text-align: center;
  background: #8B0000;
  padding: 8px;
  font-size: 13px;
}

/* TIMER */
.timer {
  text-align: center;
  color: #FF4500;
  padding: 8px;
  font-weight: bold;
}

/* CONTAINER */
.container {
  max-width: 500px;
  margin: auto;
  padding: 15px;
}

/* PRODUCT BOX */
.product-box {
  display: flex;
  gap: 10px;
  background: #111;
  padding: 10px;
  border-radius: 8px;
}

.product-box img {
  width: 70px;
  border-radius: 6px;
}

.price {
  color: gold;
}

/* TRUST */
.trust {
  font-size: 12px;
  color: #aaa;
  margin: 10px 0;
}

/* INPUT */
input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  background: #111;
  border: 1px solid #333;
  color: white;
  border-radius: 6px;
}

/* UPSELL */
.upsell {
  background: #111;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  font-size: 14px;
}

/* TOTAL */
.total {
  font-size: 18px;
  margin-top: 10px;
  color: gold;
}

/* BUTTON */
button {
  margin-top: 15px;
  padding: 14px;
  width: 100%;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

.main-btn {
  background: #FF4500;
}

.whatsapp-btn {
  background: #25D366;
}

</style>
</head>

<body>

<div class="topbar">🚚 Free Delivery | 💰 Cash on Delivery</div>
<div class="timer" id="timer">⏳ Offer ends in 10:00</div>

<div class="container">

<!-- PRODUCT -->
<div class="product-box">
  <img src="images/frame.png">
  <div>
    <h3>Pray For Gaza Frame</h3>
    <p class="price" id="price">₹299</p>
  </div>
</div>

<div class="trust">🔒 Secure Checkout | 🚚 Fast Delivery | 💰 Pay on Delivery</div>

<form id="orderForm">

<input type="text" name="name" placeholder="Full Name" required>
<input type="tel" name="phone" placeholder="Phone Number" required>
<input type="text" name="city" placeholder="City" required>
<textarea name="address" placeholder="Full Address" required></textarea>

<!-- UPSELL -->
<div class="upsell">
<input type="checkbox" id="upsell">
 Add 1 more frame for just ₹100 extra (Save ₹100)
</div>

<div class="total" id="total">Total: ₹299</div>

<button class="main-btn" type="submit">🛒 Place Order Securely</button>

</form>

<!-- WHATSAPP BACKUP -->
<button class="whatsapp-btn" onclick="orderWhatsApp()">💬 Order via WhatsApp</button>

</div>

<script>

/* TIMER */
let t=600;
setInterval(()=>{
let m=Math.floor(t/60);
let s=t%60;
if(s<10)s="0"+s;
document.getElementById("timer").innerHTML="⏳ Offer ends in "+m+":"+s;
t--;
if(t<=0)t=600;
},1000);

/* UPSELL */
let upsell=document.getElementById("upsell");
let total=document.getElementById("total");

upsell.addEventListener("change",()=>{
total.innerHTML = upsell.checked ? "Total: ₹499" : "Total: ₹299";
});

/* FORM */
document.getElementById("orderForm").addEventListener("submit",function(e){
e.preventDefault();

let name=this.name.value;
let phone=this.phone.value;
let city=this.city.value;
let address=this.address.value;

let price=upsell.checked?"₹499":"₹299";
let product=upsell.checked?"2 Frames":"1 Frame";

let msg=`New Order
Name: ${name}
Phone: ${phone}
City: ${city}
Address: ${address}
Product: ${product}
Total: ${price}`;

window.location.href="https://wa.me/919121783895?text="+encodeURIComponent(msg);
});

/* WHATSAPP */
function orderWhatsApp(){
let msg="I want to order Pray for Gaza Frame";
window.location.href="https://wa.me/919121783895?text="+encodeURIComponent(msg);
}

</script>

</body>
</html>
