<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout - Silent Aid</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: black;
  color: white;
}

/* 🔥 BG */
.bg-glow {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at bottom, rgba(255,69,0,0.3), transparent 60%);
  z-index: -1;
}

/* TOP BAR */
.marquee {
  background: #8B0000;
  padding: 10px;
  text-align: center;
  font-weight: bold;
}

/* TIMER */
.timer {
  text-align: center;
  padding: 8px;
  color: #FF4500;
  font-weight: bold;
}

/* TITLE */
h2 {
  text-align: center;
  margin-top: 20px;
  color: #D4AF37;
}

/* FORM */
form {
  max-width: 550px;
  margin: 20px auto;
  background: #111;
  padding: 20px;
  border-radius: 12px;
}

/* PRODUCT */
.product-box {
  display: flex;
  gap: 10px;
  background: #000;
  padding: 10px;
  border-radius: 8px;
  align-items: center;
}

.product-box img {
  width: 70px;
}

.price {
  color: gold;
}

/* INPUT */
label {
  margin-top: 10px;
  display: block;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  background: #222;
  border: none;
  color: white;
}

/* TRUST */
.trust {
  font-size: 12px;
  color: #aaa;
  margin-top: 10px;
}

/* BUTTON */
button {
  margin-top: 20px;
  padding: 14px;
  width: 100%;
  background: #FF4500;
  border: none;
  color: white;
  font-size: 16px;
  border-radius: 6px;
}

/* 🔔 ORDER POPUP */
.order-popup {
  position: fixed;
  bottom: 10px;
  left: 10px;
  background: #111;
  padding: 8px;
  font-size: 12px;
  border-radius: 6px;
  display: none;
}

</style>
</head>

<body>

<div class="bg-glow"></div>

<div class="marquee">🚚 Free Delivery | 💰 Cash on Delivery Available</div>

<div class="timer" id="timer">⏳ Offer ends in 10:00</div>

<h2>Complete Your Order</h2>

<form id="orderForm">

  <!-- PRODUCT -->
  <div class="product-box">
    <img src="images/frame.png">
    <div>
      <h3>Pray For Gaza Frame</h3>
      <p class="price">₹299</p>
      <p id="stock">📦 Only 7 left</p>
    </div>
  </div>

  <div class="trust">🔒 Secure Checkout | 🚚 Fast Delivery | 💰 COD Available</div>

  <label>Full Name:
    <input type="text" name="name" required>
  </label>

  <label>Email:
    <input type="email" name="email" required>
  </label>

  <label>Phone Number:
    <input type="tel" name="phone" required>
  </label>

  <label>WhatsApp Number:
    <input type="tel" name="whatsapp" required>
  </label>

  <label>City:
    <select name="city" id="citySelect" required>
      <option value="">-- Select Your City --</option>
      <option>Hyderabad</option>
      <option>Delhi</option>
      <option>Mumbai</option>
      <option>Bengaluru</option>
      <option>Chennai</option>
      <option>Kolkata</option>
      <option>Pune</option>
      <option value="Other">Other</option>
    </select>
  </label>

  <div id="otherCityField" style="display:none;">
    <label>Enter Your City:
      <input type="text" id="otherCityInput">
    </label>
  </div>

  <label>Full Address:
    <textarea name="address" required></textarea>
  </label>

  <button type="submit">🛒 Place Order Now</button>

</form>

<!-- 🔔 ORDER POPUP -->
<div class="order-popup" id="orderPopup">
Someone just ordered 🔥
</div>

<script>

/* CITY */
const citySelect = document.getElementById('citySelect');
const otherCityField = document.getElementById('otherCityField');
const otherCityInput = document.getElementById('otherCityInput');

citySelect.addEventListener('change', () => {
  if (citySelect.value === 'Other') {
    otherCityField.style.display = 'block';
    otherCityInput.required = true;
  } else {
    otherCityField.style.display = 'none';
    otherCityInput.required = false;
  }
});

/* TIMER */
let time = 600;
setInterval(()=>{
let m = Math.floor(time/60);
let s = time%60;
if(s<10)s="0"+s;
document.getElementById("timer").innerHTML="⏳ Offer ends in "+m+":"+s;
time--;
if(time<=0) time=600;
},1000);

/* 🔔 FAKE ORDERS */
setInterval(()=>{
let cities=["Delhi","Mumbai","Hyderabad","Bangalore"];
let c=cities[Math.floor(Math.random()*cities.length)];
let popup=document.getElementById("orderPopup");
popup.innerHTML="Someone from "+c+" just ordered 🔥";
popup.style.display="block";
setTimeout(()=>popup.style.display="none",3000);
},7000);

/* 📦 STOCK */
let stock=7;
setInterval(()=>{
if(stock>3){
stock--;
document.getElementById("stock").innerHTML="📦 Only "+stock+" left";
}
},15000);

/* FORM SUBMIT */
const form = document.getElementById('orderForm');

form.addEventListener('submit', function(e) {
  e.preventDefault();

  const formData = new FormData(form);

  if (citySelect.value === 'Other') {
    formData.set('city', otherCityInput.value.trim());
  }

  formData.set('product', 'Pray For Gaza Frame');
  formData.set('price', '299');

  fetch("https://script.google.com/macros/s/AKfycbxisICLhzPNqqXPnFdBcAZkiz2iuLvmoIy-kvbzXf5e4JtVyr7jKpuUldWQT9iWlex4/exec", {
    method: 'POST',
    body: formData
  })
  .then(() => {
    window.location.href = "thank-you.html";
  })
  .catch(() => {
    alert("Error submitting order");
  });

});

</script>

</body>
</html>
