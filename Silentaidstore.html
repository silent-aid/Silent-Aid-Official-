<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Silent Aid Store</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

/* BASE */
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: black;
  color: #F5F5F5;
  overflow-x: hidden;
}

/* BACKGROUND */
.hero-bg {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, rgba(0,0,0,0.8), black),
              url("https://images.unsplash.com/photo-1604014237800-1c9102c219da");
  background-size: cover;
  z-index: -2;
}

/* FIRE GLOW */
.fire-glow {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle at bottom, rgba(255,69,0,0.3), transparent);
  z-index: -1;
  animation: flicker 3s infinite alternate;
}

@keyframes flicker {
  from {opacity: 0.6;}
  to {opacity: 1;}
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 25px;
  backdrop-filter: blur(10px);
}

.logo img {
  width: 50px;
  border-radius: 50%;
}

/* CONTAINER */
.container {
  display: flex;
  gap: 50px;
  padding: 60px;
  align-items: center;
}

/* IMAGE */
.product-img {
  flex: 1;
}

.image-container {
  overflow: hidden;
  border-radius: 16px;
}

#mainImage {
  width: 100%;
  transition: transform 0.4s ease;
}

/* ZOOM */
.image-container:hover #mainImage {
  transform: scale(1.15);
}

/* GALLERY */
.gallery {
  display: flex;
  gap: 10px;
  margin-top: 15px;
}

.gallery img {
  width: 70px;
  height: 70px;
  border-radius: 8px;
  object-fit: cover;
  cursor: pointer;
  opacity: 0.6;
  transition: 0.3s;
}

.gallery img:hover {
  opacity: 1;
  transform: scale(1.1);
}

/* DETAILS */
.product-details {
  flex: 1;
}

.product-title {
  font-size: 34px;
  background: linear-gradient(to right, #fff, #D4AF37);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.product-desc {
  color: #ccc;
  margin: 20px 0;
  line-height: 1.6;
}

.price {
  font-size: 28px;
  color: #D4AF37;
}

/* BUTTON */
.btn {
  margin-top: 20px;
  padding: 15px 30px;
  background: linear-gradient(45deg, #8B0000, #FF4500);
  border: none;
  border-radius: 10px;
  color: white;
  cursor: pointer;
  box-shadow: 0 0 20px rgba(255,69,0,0.6);
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.08);
}

/* MOBILE */
@media (max-width: 768px) {
  .container {
    flex-direction: column;
    padding: 20px;
  }
}

</style>
</head>

<body>

<div class="hero-bg"></div>
<div class="fire-glow"></div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">
    <img src="images/logo1.jpg">
  </div>
  <div>Shop | Impact | Cart</div>
</div>

<!-- PRODUCT -->
<div class="container">

  <div class="product-img">

    <div class="image-container">
      <img id="mainImage" src="images/frame1.jpg">
    </div>

    <div class="gallery">
      <img src="images/frame.png" onclick="changeImage(this)">
      <img src="images/frame1.png" onclick="changeImage(this)">
      <img src="images/frame2.png" onclick="changeImage(this)">
      <img src="images/frame3.png" onclick="changeImage(this)">
    </div>

  </div>

  <div class="product-details">
    <div class="product-title">Pray for Gaza – Premium Frame</div>

    <div class="product-desc">
      A powerful visual reminder of faith, resilience, and humanity.  
      Designed to inspire reflection and awareness.  
      Every purchase contributes to meaningful impact.
    </div>

    <div class="price">₹999</div>

    <button class="btn">Buy Now</button>
  </div>

</div>

<!-- JS -->
<script>

let images = [
  "images/frame.png",
  "images/frame1.png",
  "images/frame2.png",
  "images/frame3.png"
];

let index = 0;
let autoSlide;

/* CLICK */
function changeImage(element) {
  document.getElementById("mainImage").src = element.src;
  index = images.indexOf("images/" + element.src.split('/').pop());
}

/* AUTO SLIDE */
function startSlide() {
  autoSlide = setInterval(() => {
    index = (index + 1) % images.length;
    document.getElementById("mainImage").src = images[index];
  }, 2500);
}

/* STOP ON HOVER */
document.querySelector(".image-container").addEventListener("mouseenter", () => {
  clearInterval(autoSlide);
});

document.querySelector(".image-container").addEventListener("mouseleave", () => {
  startSlide();
});

startSlide();

</script>

</body>
</html>
