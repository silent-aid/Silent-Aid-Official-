<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Checkout - Silent Aid</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: black;
  color: white;
}

/* TOP */
.marquee {
  background: #8B0000;
  padding: 8px;
  text-align: center;
  font-size: 13px;
}

/* FORM */
form {
  max-width: 500px;
  margin: 15px auto;
  padding: 15px;
}

/* PRODUCT */
.product-box {
  display: flex;
  gap: 10px;
  background: #111;
  padding: 10px;
  border-radius: 8px;
}

.product-box img {
  width: 70px;
}

/* TEXT */
.price {
  color: gold;
  font-size: 18px;
}

/* INPUT */
input, select, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  background: #222;
  border: none;
  color: white;
  border-radius: 6px;
}

/* UPSELL */
.upsell {
  background: #111;
  padding: 10px;
  margin-top: 10px;
  border-radius: 8px;
  font-size: 14px;
}

/* BUTTON */
button {
  margin-top: 15px;
  padding: 14px;
  width: 100%;
  background: #FF4500;
  border: none;
  color: white;
  font-size: 16px;
  border-radius: 8px;
}

</style>
</head>

<body>

<div class="marquee">🚚 Free Delivery | 💰 COD Available</div>

<form id="orderForm">

<div class="product-box">
<img src="images/frame.png">
<div>
<h3>Pray For Gaza Frame</h3>
<p class="price" id="totalPrice">₹299</p>
</div>
</div>

<!-- 🔥 UPSELL -->
<div class="upsell">
<input type="checkbox" id="upsell">
Add 1 more frame for just ₹100 extra (Save ₹200)
</div>

<input type="text" name="name" placeholder="Full Name" required>
<input type="tel" name="phone" placeholder="Phone Number" required>
<input type="text" name="city" placeholder="City" required>
<textarea name="address" placeholder="Full Address" required></textarea>

<button type="submit">🛒 Place Order</button>

</form>

<script>

/* PRICE UPDATE */
let base = 299;
let upsell = document.getElementById("upsell");
let price = document.getElementById("totalPrice");

upsell.addEventListener("change", ()=>{
if(upsell.checked){
price.innerHTML = "₹399";
}else{
price.innerHTML = "₹299";
}
});

/* WHATSAPP ORDER */
document.getElementById("orderForm").addEventListener("submit", function(e){
e.preventDefault();

let name = this.name.value;
let phone = this.phone.value;
let city = this.city.value;
let address = this.address.value;

let finalPrice = upsell.checked ? "₹399" : "₹299";
let product = upsell.checked ? "2 Frames" : "1 Frame";

let msg = `New Order%0A
Name: ${name}%0A
Phone: ${phone}%0A
City: ${city}%0A
Address: ${address}%0A
Product: ${product}%0A
Total: ${finalPrice}`;

window.location.href = "https://wa.me/919121783895?text=" + msg;

});

</script>

</body>
</html>
